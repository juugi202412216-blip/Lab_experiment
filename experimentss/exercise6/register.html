<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechStore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 TechStore</h1>
            <p>Create Your Account</p>
        </header>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="../exercise4/products.html">Products</a>
        </nav>
        
        <main>
            <div class="form-container">
                <h2>Create Account</h2>
                
                <div class="success-message" id="successMessage">
                    ✓ Registration successful! Redirecting to login...
                </div>
                
                <form id="registerForm" novalidate>
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                        <div class="error-message" id="fullNameError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                        <div class="error-message" id="emailError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone number">
                        <div class="error-message" id="phoneError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" placeholder="Create a strong password">
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password">
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>
                    
                    <button type="submit" class="btn">Create Account</button>
                </form>
                
                <div class="form-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </div>
            
            <a href="../index.html" class="back-link">← Back to Main Index</a>
        </main>
        
        <footer>
            <p>&copy; 2023 TechStore. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const fullName = document.getElementById('fullName');
        const email = document.getElementById('email');
        const phone = document.getElementById('phone');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const successMessage = document.getElementById('successMessage');

        // Real-time validation
        fullName.addEventListener('blur', validateFullName);
        email.addEventListener('blur', validateEmail);
        phone.addEventListener('blur', validatePhone);
        password.addEventListener('input', validatePassword);
        confirmPassword.addEventListener('blur', validateConfirmPassword);

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const isFullNameValid = validateFullName();
            const isEmailValid = validateEmail();
            const isPhoneValid = validatePhone();
            const isPasswordValid = validatePassword();
            const isConfirmPasswordValid = validateConfirmPassword();
            
            if (isFullNameValid && isEmailValid && isPhoneValid && isPasswordValid && isConfirmPasswordValid) {
                // Show success message
                successMessage.classList.add('show');
                form.reset();
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        });

        function validateFullName() {
            const value = fullName.value.trim();
            const errorElement = document.getElementById('fullNameError');
            
            if (value === '') {
                showError(fullName, errorElement, 'Full name is required');
                return false;
            } else if (value.length < 3) {
                showError(fullName, errorElement, 'Name must be at least 3 characters');
                return false;
            } else if (!/^[a-zA-Z\s]+$/.test(value)) {
                showError(fullName, errorElement, 'Name can only contain letters and spaces');
                return false;
            } else {
                showSuccess(fullName, errorElement);
                return true;
            }
        }

        function validateEmail() {
            const value = email.value.trim();
            const errorElement = document.getElementById('emailError');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (value === '') {
                showError(email, errorElement, 'Email is required');
                return false;
            } else if (!emailRegex.test(value)) {
                showError(email, errorElement, 'Please enter a valid email address');
                return false;
            } else {
                showSuccess(email, errorElement);
                return true;
            }
        }

        function validatePhone() {
            const value = phone.value.trim();
            const errorElement = document.getElementById('phoneError');
            const phoneRegex = /^[6-9]\d{9}$/;
            
            if (value === '') {
                showError(phone, errorElement, 'Phone number is required');
                return false;
            } else if (!phoneRegex.test(value)) {
                showError(phone, errorElement, 'Please enter a valid 10-digit Indian phone number');
                return false;
            } else {
                showSuccess(phone, errorElement);
                return true;
            }
        }

        function validatePassword() {
            const value = password.value;
            const errorElement = document.getElementById('passwordError');
            const strengthBar = document.getElementById('passwordStrengthBar');
            
            if (value === '') {
                showError(password, errorElement, 'Password is required');
                strengthBar.className = 'password-strength-bar';
                return false;
            } else if (value.length < 8) {
                showError(password, errorElement, 'Password must be at least 8 characters');
                strengthBar.className = 'password-strength-bar weak';
                return false;
            } else {
                // Check password strength
                let strength = 0;
                if (value.length >= 8) strength++;
                if (/[a-z]/.test(value) && /[A-Z]/.test(value)) strength++;
                if (/\d/.test(value)) strength++;
                if (/[!@#$%^&*]/.test(value)) strength++;
                
                if (strength <= 2) {
                    strengthBar.className = 'password-strength-bar weak';
                    showError(password, errorElement, 'Weak password. Add uppercase, numbers, and special characters');
                    return false;
                } else if (strength === 3) {
                    strengthBar.className = 'password-strength-bar medium';
                    showSuccess(password, errorElement);
                    return true;
                } else {
                    strengthBar.className = 'password-strength-bar strong';
                    showSuccess(password, errorElement);
                    return true;
                }
            }
        }

        function validateConfirmPassword() {
            const value = confirmPassword.value;
            const errorElement = document.getElementById('confirmPasswordError');
            
            if (value === '') {
                showError(confirmPassword, errorElement, 'Please confirm your password');
                return false;
            } else if (value !== password.value) {
                showError(confirmPassword, errorElement, 'Passwords do not match');
                return false;
            } else {
                showSuccess(confirmPassword, errorElement);
                return true;
            }
        }

        function showError(input, errorElement, message) {
            input.classList.add('error');
            input.classList.remove('success');
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        function showSuccess(input, errorElement) {
            input.classList.remove('error');
            input.classList.add('success');
            errorElement.classList.remove('show');
        }
    </script>
</body>
</html>
